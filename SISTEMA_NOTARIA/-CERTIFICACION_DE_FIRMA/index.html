<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Cert. de Firma</title>
    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="../css/documento.css">
    <link rel="stylesheet" href="../css/indexcertesc.css">
</head>

<body>    
    <h1>REGISTRAR <strong>CERTIFICACIÓN DE FIRMA</strong></h1>
    <a href="Lista.php" id="Lista" class="button" onclick="return true;">Lista</a>
    <a href="../ver_preguntas.php" id="Preguntas" class="button" onclick="return guardarOrigen(this);">UIF</a><br>

<script>
function guardarOrigen(enlace) {
    // Guardar en localStorage (COMPARTIDO entre TODAS las pestañas)
    const origen = window.location.pathname + window.location.search;
    localStorage.setItem('origen_anterior', origen);
    
    // Para click normal, vamos al PHP
    enlace.href = '../ver_preguntas.php';
    return true;
}
</script>

    <label id="Ultimo"></label>
    <label id="Cuantas"></label>
    <div id="mensajeAviso" class="aviso"></div>
    <form id="Form">
        <fieldset name="field">
            <legend>Documento</legend>
            <div class="numero">
                <label for="numero">Número:</label>
                <input type="text" id="numero" name="numero" required placeholder="Ej. 0000/0000" maxlength="9" autocomplete="off" title="Número de documento&#10;Ej. 9999/9999">
            </div>
            <div class="fecha">
                <label for="fecha">Fecha:</label>
                <input type="text" id="fecha" name="fecha_documento" placeholder="Ej: 5 abril 2025" required title="Fecha de documento&#10;Ej. 5 de abril del 202X,&#10;5 abril 202X,&#10;5 4 202X ">
            </div>
            <div class="archivo">
                <label for="archivo">Documento <strong style="opacity: 0.2; font-size: 80%;">(nombre)</strong>:</label>
                <input type="text" id="archivo" name="documento" required maxlength="100" placeholder="Titulo Documento" autocomplete="off" title="Titulo del documento&#10;Ej: Tramite notarial">
                <ul class="listaSugerenciasArchivo"></ul>
            </div>
            <div class="tipo_documento">
                <label>Tipo de Documento:</label>
                <select name="tipo_documento" id="tipo_documento" title="Tipo de documento">
                    <option value="Ninguno">NINGUNO</option>
                    <option value="Compra/Venta">COMPRA/VENTA</option>
                    <option value="Sociedad">SOCIEDAD</option>
                    <option value="ANULADO">ANULADO</option>
                </select>
            </div>
            <div class="tipo_venta" id="contenedor_tipo_venta">
                <label>Tipo de Venta:</label>
                <select name="tipo_venta" id="tipo_venta" title="Tipo de venta del documento">
                    <option value="Mueble">MUEBLE</option>
                    <option value="Inmueble">INMUEBLE</option>
                </select>
            </div>            
            <div class="tipo_trato" id="contenedor_tipo_trato">
                <label>Tipo de Trato:</label>
                <select name="tipo_trato" required title="Tipo de trato de la sociedad">
                    <option value="Ninguno">NINGUNO</option>
                    <option value="Creacion">Creacion</option>
                    <option value="Modificacion">Modificacion</option>
                    <option value="Extincion">Extincion</option>
                </select>
            </div>            
            <div class="tipo_pago" id="contenedor_tipo_pago">
                <label>Tipo de Pago:</label>
                <select name="tipo_pago" required title="Tipo de pago de la transferencia">
                    <option value="Ninguno">NINGUNO</option>
                    <option value="Efectivo">EFECTIVO</option>
                </select>
            </div>            
            <div class="beneficiarios" id="contenedor_beneficiarios">
                <label for="beneficiarios">Beneficiarios:</label>
                <input type="text" id="beneficiarios" name="beneficiarios" maxlength="2" placeholder="Nro" autocomplete="off" title="Beneficiario(s) final(es)&#10;Ej: 2 (puede estar vacio)">
            </div>
            <div class="municipio">
                <label for="municipio">Municipio:</label>
                <input type="text" id="municipio" name="municipio" maxlength="100" placeholder="Santa Cruz - Santa Cruz de la Sierra" autocomplete="off" title="Municipio&#10;Ej: La guardia&#10;(Si lo deja vacio es automatico&#10;'Santa Cruz - Santa Cruz de la Sierra')">
                <ul class="listaSugerenciasmunicipio"></ul>
            </div>
        </fieldset>


        <fieldset>
            <legend title="Se puede saltar aca con 'Alt'+'n' y te pone en Nombre">Participantes</legend>
            <div id="participantesContainer">
                <div class="participante">
                    <div class="nombre">
                        <label>Nombre:</label>
                        <input type="text" id="nombre" name="nombre[]" maxlength="150" placeholder="Nombre Completo" autocomplete="off" required title="Nombre&#10;(Automaticamente cada primer letra se pone en mayuscula)">
                        <ul class="listaSugerenciasNombre"></ul>
                    </div>
                    <div class="identificacion">
                        <label>C.I. o Pass.:</label>
                        <input type="text" id="identificacion" name="identificacion[]" maxlength="25" placeholder="C.I. o Pasaporte" autocomplete="off" required title="Carnet/Pasaporte/Identificacion&#10;Ej: 77777-1A&#10;(Automatico se pone mayuscula para las letras)">
                        <ul class="listaSugerenciasIdentificacion"></ul>
                    </div>
                    <div class="tipopersona">
                        <label>Tipo de Persona:</label>
                        <select name="tipo_persona[]" title="Tipo de Persona">
                            <option value="Natural" selected>NATURAL</option>
                            <option value="Jurídica">JURÍDICA</option>
                            <option value="ANULADO">ANULADO</option>
                        </select>
                    </div>
                    <div class="calidad">
                        <label>Calidad:</label>
                        <input type="text" name="calidad[]" maxlength="25" placeholder="Calidad" autocomplete="off" title="Caldidad&#10;Ej: Vendedor/Comprador&#10;(Si lo deja vacio es automatico 'Parte')&#10;(Automaticamente cada primer letra se pone en mayuscula)">
                        <ul class="listaSugerenciascalidad"></ul>
                    </div>
                    <div class="pais">
                        <label>País:</label>
                        <input type="text" id="pais" name="pais[]" placeholder="Bolivia" maxlength="40" autocomplete="off" title="País&#10;Ej: Bolivia&#10;(Si lo deja vacio es automatico 'Bolivia')">
                        <ul class="listaSugerenciasPais"></ul>                            
                    </div>
                    <div class="nacionalidad">
                        <label for="nacionalidad">Nacionalidad:</label>
                        <input type="text" id="nacionalidad" name="nacionalidad[]" placeholder="Escribe en País..." maxlength="30" readonly title="Nacionalidad&#10;(Se escribe automaticamente el gentilicio dependiendo al pais)">
                    </div>
                    <br>
                    <button type="button" class="removeParticipante" title="Eliminar participante&#10;(Se puede activar con 'Alt'+'-')">Eliminar</button>
                </div>
            </div>
            <button type="button" id="addParticipante" title="Añadir participante&#10;(Se puede activar con 'Alt'+'+')">Añadir otro participante</button>
        </fieldset>

    <button type="submit" title="Gueardad trámite&#10;(Se puede activar con 'Enter')">Guardar</button>
    
    </form>

</body>
</html>
